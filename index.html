<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crypto Watchlist</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ======= HEADER ======= -->
  <header>
    <div class="header-left">
      <span class="logo">₿</span>
      <h1>Crypto Watchlist</h1>
    </div>
    <p class="subtitle">Live prices from CoinGecko API</p>
  </header>

  <!-- ======= MAIN CONTENT ======= -->
  <main>

    <!-- Loading spinner - shown while data is being fetched -->
    <div id="loading">
      <div class="spinner"></div>
      <p>Fetching live crypto data...</p>
    </div>

    <!-- Error message - shown if something goes wrong -->
    <div id="error-message" class="hidden">
      <p>⚠️ Something went wrong. Please try again later.</p>
      <button onclick="fetchCoins()">Retry</button>
    </div>

    <!-- This is where the coin cards will appear -->
    <div id="coins-container" class="hidden"></div>

  </main>

  <!-- ======= FOOTER ======= -->
  <footer>
    <p>Data from <a href="https://www.coingecko.com" target="_blank">CoinGecko API</a> &nbsp;|&nbsp; Crypto Watchlist Project</p>
  </footer>

  <!-- Link to our JavaScript file -->
  <script src="app.js"></script>

</body>
</html>
